<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manolo AI Helper</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <h1>Manolo AI Helper</h1>
        <div class="row">
          <button id="newChat" type="button">New chat</button>
          <span id="status" class="status"></span>
        </div>
      </header>
      <section id="log" class="log" aria-live="polite"></section>
      <form id="form" class="composer">
        <textarea id="input" rows="3" placeholder="Message…" required></textarea>
        <button type="submit">Send</button>
      </form>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
